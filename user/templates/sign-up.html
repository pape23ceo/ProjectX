<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0b1120, #1a2639);
            padding: 1.5rem;
        }

        /* ── Card ── */
        .signup-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2.5rem 2.8rem 3rem;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .signup-card:hover {
            transform: translateY(-4px);
        }

        /* ── Header ── */
        .card-header {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .card-header .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            width: 64px;
            height: 64px;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-shadow: 0 12px 28px -8px rgba(99, 102, 241, 0.35);
        }

        .card-header .icon-wrap i {
            font-size: 2rem;
            color: #fff;
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .card-header p {
            color: #a1b0cc;
            font-size: 0.95rem;
            margin-top: 0.4rem;
            font-weight: 400;
        }

        /* ── Form ── */
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #d4def0;
            letter-spacing: 0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group label i {
            color: #818cf8;
            font-size: 0.9rem;
            width: 18px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrap:focus-within {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .input-wrap input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 400;
            color: #f0f4ff;
            font-family: inherit;
        }

        .input-wrap input::placeholder {
            color: #7a8aa8;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .input-wrap .toggle-pwd {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #7a8aa8;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-wrap .toggle-pwd:hover {
            color: #d4def0;
        }

        /* ── Password strength bar ── */
        .pwd-strength {
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        .strength-bar .fill {
            height: 100%;
            width: 0%;
            border-radius: 8px;
            transition: width 0.3s ease, background 0.3s ease;
            background: #4ade80;
        }

        .strength-text {
            font-size: 0.7rem;
            font-weight: 500;
            color: #7a8aa8;
            min-width: 56px;
            text-align: right;
            letter-spacing: 0.02em;
        }

        /* ── Terms ── */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            margin-top: 0.2rem;
        }

        .terms input[type="checkbox"] {
            appearance: none;
            width: 18px;
            min-width: 18px;
            height: 18px;
            margin-top: 2px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terms input[type="checkbox"]:checked {
            background: #6366f1;
            border-color: #6366f1;
        }

        .terms input[type="checkbox"]:checked::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.7rem;
            color: #fff;
        }

        .terms label {
            font-size: 0.85rem;
            color: #b0c0dc;
            line-height: 1.4;
            cursor: pointer;
        }

        .terms label a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .terms label a:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }

        /* ── Submit ── */
        .btn-submit {
            margin-top: 0.4rem;
            padding: 0.95rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 8px 24px -6px rgba(99, 102, 241, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            letter-spacing: 0.01em;
        }

        .btn-submit:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 32px -8px rgba(99, 102, 241, 0.5);
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        .btn-submit i {
            font-size: 1rem;
        }

        /* ── Footer ── */
        .form-footer {
            text-align: center;
            margin-top: 1.8rem;
            color: #7a8aa8;
            font-size: 0.9rem;
        }

        .form-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }

        /* ── Error / success messages ── */
        .message {
            font-size: 0.8rem;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.2rem;
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            border-left: 3px solid #ef4444;
        }

        .message.success {
            background: rgba(74, 222, 128, 0.10);
            color: #86efac;
            border-left-color: #4ade80;
        }

        .message.show {
            display: flex;
        }

        .message i {
            font-size: 0.9rem;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .signup-card {
                padding: 2rem 1.5rem 2.2rem;
                border-radius: 2rem;
            }

            .card-header h1 {
                font-size: 1.6rem;
            }

            .input-wrap input {
                padding: 0.8rem 0.9rem;
                font-size: 0.9rem;
            }

            .btn-submit {
                padding: 0.85rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="signup-card">
        <!-- Header -->
        <div class="card-header">
            <div class="icon-wrap">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create account</h1>
            <p>Join us — it takes just a moment</p>
        </div>

        <!-- Form -->
        <form method="post" class="signup-form" id="signupForm" novalidate>
            {% csrf_token %}
            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                <div class="input-wrap">
                    <input type="text" name="username" id="fullName" placeholder="e.g. Alex Rivera" required />
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <div class="input-wrap">
                    <input type="email" name="email" id="email" placeholder="hello@example.com" required />
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrap">
                    <input type="password" name="password1" id="password" placeholder="Min. 8 characters" required />
                    <button type="button" class="toggle-pwd" data-target="password"
                        aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <!-- Strength bar -->
                <div class="pwd-strength">
                    <div class="strength-bar">
                        <div class="fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Weak</span>
                </div>
            </div>

            <!-- Confirm Password (NEW) -->
            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-check-circle"></i> Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" name="password2" id="confirmPassword" placeholder="Re-enter your password" required />
                    <button type="button" class="toggle-pwd" data-target="confirmPassword"
                        aria-label="Toggle confirm password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="terms">
                <input type="checkbox" id="termsCheck" required />
                <label for="termsCheck">
                    I agree to the
                    <a href="#" onclick="return false;">Terms of Service</a>
                    and
                    <a href="#" onclick="return false;">Privacy Policy</a>.
                </label>
            </div>

            <!-- Message area -->
            <div class="message" id="formMessage">
                <i class="fas fa-circle-exclamation"></i>
                <span id="messageText">Please fix the errors above.</span>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign Up
            </button>
        </form>

        <!-- Footer -->
        <div class="form-footer">
            Already have an account? <a href="#" onclick="return false;">Log in</a>
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            // ── DOM refs ──

            // ── Toggle password visibility for both fields ──
            document.querySelectorAll('.toggle-pwd').forEach(btn => {
                btn.addEventListener('click', function () {
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    if (!input) return;
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    icon.classList.toggle('fa-eye');
                    icon.classList.toggle('fa-eye-slash');
                });
            });

            // ── Password strength ──
            function evaluateStrength(pwd) {
                let score = 0;
                if (pwd.length >= 8) score += 1;
                if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score += 1;
                if (/\d/.test(pwd)) score += 1;
                if (/[^a-zA-Z0-9]/.test(pwd)) score += 1;
                return score;
            }

            function updateStrength() {
                const pwd = password.value;
                const score = evaluateStrength(pwd);
                let width = 0,
                    label = 'Weak',
                    color = '#f87171';

                if (pwd.length === 0) {
                    width = 0;
                    label = 'Weak';
                    color = '#f87171';
                } else if (score === 1) {
                    width = 25;
                    label = 'Weak';
                    color = '#f87171';
                } else if (score === 2) {
                    width = 50;
                    label = 'Fair';
                    color = '#fbbf24';
                } else if (score === 3) {
                    width = 75;
                    label = 'Good';
                    color = '#60a5fa';
                } else if (score === 4) {
                    width = 100;
                    label = 'Strong';
                    color = '#4ade80';
                }

                strengthFill.style.width = width + '%';
                strengthFill.style.background = color;
                strengthText.textContent = label;
            }

            password.addEventListener('input', updateStrength);

            // ── Validation helper ──
            function showMessage(msg, isSuccess = false) {
                messageEl.classList.add('show');
                messageEl.classList.toggle('success', isSuccess);
                messageText.textContent = msg;
                if (isSuccess) {
                    setTimeout(() => {
                        messageEl.classList.remove('show');
                    }, 5000);
                }
            }

            function hideMessage() {
                messageEl.classList.remove('show');
            }

            // ── Form submit ──
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                hideMessage();

                // Trim values
                const nameVal = fullName.value.trim();
                const emailVal = email.value.trim();
                const pwdVal = password.value;
                const confirmVal = confirmPassword.value.trim();

                // ── Validate name ──
                if (nameVal.length < 2) {
                    showMessage('Please enter your full name (at least 2 characters).');
                    fullName.focus();
                    return;
                }

                // ── Validate email ──
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailVal)) {
                    showMessage('Please enter a valid email address.');
                    email.focus();
                    return;
                }

                // ── Validate password ──
                if (pwdVal.length < 8) {
                    showMessage('Password must be at least 8 characters.');
                    password.focus();
                    return;
                }

                // ── Validate confirm password ──
                if (confirmVal === '') {
                    showMessage('Please re-enter your password.');
                    confirmPassword.focus();
                    return;
                }
                if (pwdVal !== confirmVal) {
                    showMessage('Passwords do not match. Please try again.');
                    confirmPassword.focus();
                    confirmPassword.select();
                    return;
                }

                // ── Validate terms ──
                if (!termsCheck.checked) {
                    showMessage('You must agree to the Terms of Service and Privacy Policy.');
                    termsCheck.focus();
                    return;
                }


                // (Optional) Reset form after success?
                // form.reset();
                // strengthFill.style.width = '0%';
                // strengthText.textContent = 'Weak';
                // strengthFill.style.background = '#f87171';
                // document.querySelectorAll('.toggle-pwd').forEach(btn => {
                //     const icon = btn.querySelector('i');
                //     icon.classList.remove('fa-eye-slash');
                //     icon.classList.add('fa-eye');
                // });
                // document.getElementById('password').setAttribute('type', 'password');
                // document.getElementById('confirmPassword').setAttribute('type', 'password');
                // hideMessage();
            });

            // ── Init strength bar on load ──
            updateStrength();

        })();
    </script>

</body>

</html>
