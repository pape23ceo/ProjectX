<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Display</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body::before {
            content: "";
            position: fixed; /* Make the background image fixed in the viewport */
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            /* Set the background image using Django's static file handling */
            background-image: url("{% static 'images/bg_pic/Canyon-by-Ashim-DSilva.jpg' %}");
            background-size: cover; /* Ensure the background image covers the entire viewport */
            background-position: center; /* Center the background image */
            z-index: -1; /* Place the background image behind the body content */
            filter: blur(15px); /* Apply a blur effect to the background image */
        }
    </style>
</head>

<body>
    <div class="search-container">
        <input type="text" placeholder="Search" class="search">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
            </path>
        </svg>
    </div>
    <div class="container-info">
        <div class="city">Uttar Pradesh ,Chandauli</div>
        <div class="temp-img">
            <img src="{% static 'images/weather_pic/clearsky_day.svg' %}" alt="">
            <div class="temperature">{{temp}}&deg;C</div>
        </div>
    </div>
    <div class="container-date_time">
        <div class="time">{{times}}</div>
        <div class="date">Wednesday 1 {{month}} {{year}}</div>
    </div>
</body>

</html>
